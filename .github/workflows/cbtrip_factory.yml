name: cbtrip_factory

on:
  schedule:
    - cron: '0 */6 * * *' # 6時間おきにシフトイン（24時間で4回稼働）
  workflow_dispatch:      # 手動で「Start」ボタンを押す用

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Trip Searcher
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py
